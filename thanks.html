<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thanks for reaching out — your message to Alya Aldaka was sent." />
  <title>Message sent — Alya Aldaka</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- Apply saved theme before paint so it matches the main site -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("alya-theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
        else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches)
          document.documentElement.setAttribute("data-theme", "light");
      } catch (e) {}
    })();
  </script>

  <style>
    .thanks {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 24px;
    }
    .thanks__card {
      max-width: 540px;
      width: 100%;
      text-align: center;
      padding: 48px 40px;
    }
    .thanks__badge {
      width: 76px; height: 76px;
      margin: 0 auto 26px;
      border-radius: 50%;
      display: grid; place-items: center;
      background: var(--grad);
      box-shadow: var(--glow);
      animation: pop .5s var(--ease) both;
    }
    .thanks__badge svg {
      width: 36px; height: 36px;
      fill: none; stroke: #1a0e14; stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: draw .5s var(--ease) .25s forwards;
    }
    .thanks__title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .thanks__msg {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin: 16px auto 32px;
      max-width: 40ch;
    }
    .thanks__actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .thanks__note {
      font-family: var(--font-mono);
      font-size: .8rem;
      color: var(--rose);
      margin-top: 28px;
    }
    .thanks__card { animation: rise .6s var(--ease) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
    @keyframes pop  { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .thanks__card, .thanks__badge, .thanks__badge svg { animation: none; }
      .thanks__badge svg { stroke-dashoffset: 0; }
    }
    [data-theme="light"] .thanks__card {
      background: #ffffff;
      border-color: rgba(120, 80, 100, 0.16);
    }
    [data-theme="light"] .aurora__blob { opacity: .2; }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="aurora__blob aurora__blob--rose"></span>
    <span class="aurora__blob aurora__blob--mauve"></span>
    <span class="aurora__blob aurora__blob--coral"></span>
  </div>

  <main class="thanks">
    <div class="card thanks__card">
      <div class="thanks__badge" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
      </div>

      <p class="eyebrow" style="justify-content:center;">// message sent</p>
      <h1 class="thanks__title">Thanks — I'll be in touch <span class="grad-text">soon</span>.</h1>
      <p class="thanks__msg">
        Your message landed in my inbox. I read everything myself and usually reply
        within a day or two. Talk soon!
      </p>

      <div class="thanks__actions">
        <a class="btn btn--primary" href="index.html">Back to portfolio</a>
        <a class="btn btn--ghost" href="index.html#projects">See more projects</a>
      </div>

      <p class="thanks__note">— Alya Aldaka</p>
    </div>
  </main>
</body>
</html>
